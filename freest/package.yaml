name:       freest
version:    5.0
license:    BSD3
author:     The FreeST Team
copyright:  © 2024 FreeST Team.
synopsis:   The FreeST compiler
maintainer: The FreeST Team
homepage:   https://freest-lang.github.io/
category:   Session types

default-extensions:
  - FlexibleInstances
  - LambdaCase
  - TupleSections
  - ViewPatterns
  - MultiWayIf
  - PatternSynonyms
  - BlockArguments
  - FlexibleContexts
  - NamedFieldPuns


extra-source-files:
  - README.md

dependencies:
  - base >= 4.7 && < 5
  - array <= 0.5.6.0
  - containers >= 0.5.9
  - mtl >= 2.2.1
  - directory >= 1.3.2.0
  - filepath >= 1.4.2
  - optparse-applicative >= 0.16.1.0
  - extra >= 1.7.9
  - transformers >= 0.5.6.2

library:
  source-dirs: src
  build-tools:
    - alex
    - happy
  exposed-modules:
    - FreeST
    - UI.CLI
    - UI.Error
    - Parser.Parser
    - Parser.LexerUtils
    - Parser.Scoping
    - Syntax.Base
    - Syntax.Expression
    - Syntax.Kind
    - Syntax.Module
    - Syntax.Names
    - Syntax.Normalisation
    - Syntax.Substitution
    - Syntax.Type
    - TypeEquivalence.TypeEquivalence
    - Validation.Expose
    - Validation.Kinding
    - Validation.Typing
    - Utils

executables:
  freest:
    main:        FreeST.hs
    source-dirs: src
    build-tools:
      - alex
      - happy
    ghc-options: 
      - -main-is FreeST 
      - -threaded 
      - -rtsopts 
      - -with-rtsopts=-N

tests:
    prog:
      main: ProgSpec.hs
      source-dirs: 
        - test/prog
      dependencies:
        - freest 
        - hspec >= 2.7.1       
        - HUnit >= 1.6.0.0
        - silently >= 1.2.5.1
      ghc-options: 
        - -O2 -threaded 
        - -rtsopts 
        - -with-rtsopts=-N
    unit:
      main: UnitSpec.hs
      source-dirs:
        - test/unit
      dependencies:
        - freest
        - hspec >= 2.7.1
        - hspec-expectations >= 0.8.2
        - hspec-discover >= 2.7.1
        - split >= 0.2.3.3